<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 82">
  <defs>
    <radialGradient id="bodyG" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#30204A"/>
      <stop offset="55%"  stop-color="#180C2C"/>
      <stop offset="100%" stop-color="#080412"/>
    </radialGradient>
    <linearGradient id="neckG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B88C50"/>
      <stop offset="50%" stop-color="#7A5830"/>
      <stop offset="100%" stop-color="#B88C50"/>
    </linearGradient>
    <linearGradient id="puG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#28183A"/>
      <stop offset="100%" stop-color="#10081C"/>
    </linearGradient>
  </defs>

  <!-- Headstock — 3+3 for 6-string -->
  <path d="M 15,1 L 43,1 Q 45,1 45,3 L 45,11 Q 45,15 41,15 L 15,15 Q 13,15 13,13 L 13,3 Q 13,1 15,1 Z"
        fill="#140A20"/>
  <path d="M 15,1 L 43,1 Q 45,1 45,3 L 45,11 Q 45,15 41,15 L 15,15 Q 13,15 13,13 L 13,3 Q 13,1 15,1 Z"
        fill="none" stroke="#281540" stroke-width="0.6"/>

  <!-- 3 pegs LEFT -->
  <line x1="13" y1="3.5"  x2="7"  y2="3.5"  stroke="#A070C0" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="6"  cy="3.5"  r="2.8" fill="#A070C0"/>
  <circle cx="6"  cy="3.5"  r="1.1" fill="rgba(255,255,255,0.3)"/>
  <line x1="13" y1="7"    x2="7"  y2="7"    stroke="#A070C0" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="6"  cy="7"    r="2.8" fill="#A070C0"/>
  <circle cx="6"  cy="7"    r="1.1" fill="rgba(255,255,255,0.3)"/>
  <line x1="13" y1="10.5" x2="7"  y2="10.5" stroke="#A070C0" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="6"  cy="10.5" r="2.8" fill="#A070C0"/>
  <circle cx="6"  cy="10.5" r="1.1" fill="rgba(255,255,255,0.3)"/>

  <!-- 3 pegs RIGHT -->
  <line x1="45" y1="3.5"  x2="51" y2="3.5"  stroke="#A070C0" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="52" cy="3.5"  r="2.8" fill="#A070C0"/>
  <circle cx="52" cy="3.5"  r="1.1" fill="rgba(255,255,255,0.3)"/>
  <line x1="45" y1="7"    x2="51" y2="7"    stroke="#A070C0" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="52" cy="7"    r="2.8" fill="#A070C0"/>
  <circle cx="52" cy="7"    r="1.1" fill="rgba(255,255,255,0.3)"/>
  <line x1="45" y1="10.5" x2="51" y2="10.5" stroke="#A070C0" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="52" cy="10.5" r="2.8" fill="#A070C0"/>
  <circle cx="52" cy="10.5" r="1.1" fill="rgba(255,255,255,0.3)"/>

  <!-- Nut (widest — 6 strings) -->
  <rect x="23" y="16" width="14" height="2" rx="1" fill="#E8E0D0"/>

  <!-- Neck (widest bass neck) -->
  <rect x="23" y="18" width="14" height="26" rx="2" fill="url(#neckG)"/>
  <rect x="23" y="18" width="14" height="26" rx="2" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>

  <!-- Frets -->
  <line x1="23.5" y1="23" x2="36.5" y2="23" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="23.5" y1="28" x2="36.5" y2="28" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="23.5" y1="33" x2="36.5" y2="33" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="23.5" y1="38" x2="36.5" y2="38" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="23.5" y1="43" x2="36.5" y2="43" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>

  <!-- 6 strings on neck -->
  <line x1="24.5" y1="18" x2="24.5" y2="44" stroke="#CCC" stroke-width="0.58" opacity="0.55"/>
  <line x1="26.2" y1="18" x2="26.2" y2="44" stroke="#CCC" stroke-width="0.48" opacity="0.55"/>
  <line x1="28"   y1="18" x2="28"   y2="44" stroke="#CCC" stroke-width="0.40" opacity="0.55"/>
  <line x1="29.8" y1="18" x2="29.8" y2="44" stroke="#CCC" stroke-width="0.34" opacity="0.55"/>
  <line x1="31.5" y1="18" x2="31.5" y2="44" stroke="#CCC" stroke-width="0.30" opacity="0.55"/>
  <line x1="33.2" y1="18" x2="33.2" y2="44" stroke="#CCC" stroke-width="0.28" opacity="0.55"/>

  <!-- Wide double-cutaway bass body for 6-string -->
  <path d="
    M 23,44 C 20,44 14,42 10,44 C 4,47 2,52 2,58 C 2,64 5,68 9,70
    C 6,72 4,76 4,80 L 56,80 C 56,76 54,72 51,70 C 55,68 58,64 58,58
    C 58,52 56,46 50,44 C 46,43 42,44 42,44 C 42,45 39,46 37,44 L 23,44 Z
  " fill="url(#bodyG)"/>

  <!-- Body edge highlight — purple tint for 6-string -->
  <path d="
    M 23,44 C 20,44 14,42 10,44 C 4,47 2,52 2,58 C 2,64 5,68 9,70
    C 6,72 4,76 4,80 L 56,80 C 56,76 54,72 51,70 C 55,68 58,64 58,58
    C 58,52 56,46 50,44 C 46,43 42,44 42,44 C 42,45 39,46 37,44 L 23,44 Z
  " fill="none" stroke="rgba(160,100,220,0.22)" stroke-width="1.2"/>

  <!-- Body sheen -->
  <ellipse cx="14" cy="57" rx="8" ry="12" fill="rgba(120,70,180,0.07)" transform="rotate(-10,14,57)"/>

  <!-- Pickup 1 (neck) — wide, 6-string -->
  <rect x="16" y="54" width="28" height="5" rx="2" fill="url(#puG)"/>
  <rect x="16" y="54" width="28" height="5" rx="2" fill="none" stroke="rgba(160,100,255,0.25)" stroke-width="0.5"/>
  <circle cx="20" cy="56.5" r="1.2" fill="#8050C0" opacity="0.75"/>
  <circle cx="23" cy="56.5" r="1.2" fill="#8050C0" opacity="0.75"/>
  <circle cx="26" cy="56.5" r="1.2" fill="#8050C0" opacity="0.75"/>
  <circle cx="29" cy="56.5" r="1.2" fill="#8050C0" opacity="0.75"/>
  <circle cx="32" cy="56.5" r="1.2" fill="#8050C0" opacity="0.75"/>
  <circle cx="35" cy="56.5" r="1.2" fill="#8050C0" opacity="0.75"/>

  <!-- Pickup 2 (bridge) -->
  <rect x="17" y="62" width="26" height="4.5" rx="2" fill="url(#puG)"/>
  <rect x="17" y="62" width="26" height="4.5" rx="2" fill="none" stroke="rgba(160,100,255,0.25)" stroke-width="0.5"/>
  <circle cx="21" cy="64.2" r="1.1" fill="#8050C0" opacity="0.75"/>
  <circle cx="24" cy="64.2" r="1.1" fill="#8050C0" opacity="0.75"/>
  <circle cx="27" cy="64.2" r="1.1" fill="#8050C0" opacity="0.75"/>
  <circle cx="30" cy="64.2" r="1.1" fill="#8050C0" opacity="0.75"/>
  <circle cx="33" cy="64.2" r="1.1" fill="#8050C0" opacity="0.75"/>
  <circle cx="36" cy="64.2" r="1.1" fill="#8050C0" opacity="0.75"/>

  <!-- Bridge -->
  <rect x="18" y="71" width="24" height="5" rx="2" fill="#180C28"/>
  <rect x="19" y="72.5" width="22" height="2" rx="1" fill="#7850A8"/>
  <circle cx="22"   cy="73.5" r="1" fill="#6040A0" opacity="0.8"/>
  <circle cx="25"   cy="73.5" r="1" fill="#6040A0" opacity="0.8"/>
  <circle cx="28"   cy="73.5" r="1" fill="#6040A0" opacity="0.8"/>
  <circle cx="31"   cy="73.5" r="1" fill="#6040A0" opacity="0.8"/>
  <circle cx="34"   cy="73.5" r="1" fill="#6040A0" opacity="0.8"/>
  <circle cx="37"   cy="73.5" r="1" fill="#6040A0" opacity="0.8"/>

  <!-- Strap pin -->
  <circle cx="30" cy="80.5" r="2" fill="#605870" opacity="0.8"/>

  <!-- Strings from neck to bridge -->
  <line x1="24.5" y1="44" x2="22"   y2="72.5" stroke="#CCC" stroke-width="0.58" opacity="0.38"/>
  <line x1="26.2" y1="44" x2="25"   y2="72.5" stroke="#CCC" stroke-width="0.48" opacity="0.38"/>
  <line x1="28"   y1="44" x2="28"   y2="72.5" stroke="#CCC" stroke-width="0.40" opacity="0.38"/>
  <line x1="29.8" y1="44" x2="31"   y2="72.5" stroke="#CCC" stroke-width="0.34" opacity="0.38"/>
  <line x1="31.5" y1="44" x2="34"   y2="72.5" stroke="#CCC" stroke-width="0.30" opacity="0.38"/>
  <line x1="33.2" y1="44" x2="37"   y2="72.5" stroke="#CCC" stroke-width="0.28" opacity="0.38"/>
</svg>
