<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 82">
  <defs>
    <!-- Koa wood gradient — warm honey/amber -->
    <radialGradient id="bodyG" cx="45%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#E8A840"/>
      <stop offset="45%"  stop-color="#C07820"/>
      <stop offset="100%" stop-color="#7A4C0C"/>
    </radialGradient>
    <linearGradient id="neckG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D0A050"/>
      <stop offset="50%" stop-color="#8A6028"/>
      <stop offset="100%" stop-color="#D0A050"/>
    </linearGradient>
    <radialGradient id="holeG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0A0A14"/>
    </radialGradient>
  </defs>

  <!-- Headstock (compact, square, koa-colored) -->
  <rect x="18" y="1" width="24" height="12" rx="3.5" fill="#3A1C04"/>
  <rect x="18" y="1" width="24" height="12" rx="3.5" fill="none" stroke="#5C2E08" stroke-width="0.6"/>

  <!-- Tuning pegs LEFT (2) — gold friction pegs -->
  <line x1="18" y1="4"  x2="11" y2="4"  stroke="#E0B840" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="10" cy="4"  r="3.2" fill="#E0B840"/>
  <circle cx="10" cy="4"  r="1.3" fill="rgba(255,255,255,0.4)"/>
  <line x1="18" y1="9"  x2="11" y2="9"  stroke="#E0B840" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="10" cy="9"  r="3.2" fill="#E0B840"/>
  <circle cx="10" cy="9"  r="1.3" fill="rgba(255,255,255,0.4)"/>

  <!-- Tuning pegs RIGHT (2) -->
  <line x1="42" y1="4"  x2="49" y2="4"  stroke="#E0B840" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="50" cy="4"  r="3.2" fill="#E0B840"/>
  <circle cx="50" cy="4"  r="1.3" fill="rgba(255,255,255,0.4)"/>
  <line x1="42" y1="9"  x2="49" y2="9"  stroke="#E0B840" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="50" cy="9"  r="3.2" fill="#E0B840"/>
  <circle cx="50" cy="9"  r="1.3" fill="rgba(255,255,255,0.4)"/>

  <!-- Nut -->
  <rect x="26" y="13" width="8" height="2" rx="1" fill="#F5EDD0"/>

  <!-- Neck (slender) -->
  <rect x="26" y="15" width="8" height="22" rx="1.5" fill="url(#neckG)"/>
  <rect x="26" y="15" width="8" height="22" rx="1.5" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="0.5"/>

  <!-- Frets (ukulele — more frets per length) -->
  <line x1="26.5" y1="19" x2="33.5" y2="19" stroke="#C09840" stroke-width="0.7" opacity="0.65"/>
  <line x1="26.5" y1="23" x2="33.5" y2="23" stroke="#C09840" stroke-width="0.7" opacity="0.65"/>
  <line x1="26.5" y1="27" x2="33.5" y2="27" stroke="#C09840" stroke-width="0.7" opacity="0.65"/>
  <line x1="26.5" y1="31" x2="33.5" y2="31" stroke="#C09840" stroke-width="0.7" opacity="0.65"/>
  <line x1="26.5" y1="35" x2="33.5" y2="35" stroke="#C09840" stroke-width="0.7" opacity="0.65"/>

  <!-- 4 strings on neck -->
  <line x1="27.6" y1="15" x2="27.6" y2="37" stroke="#CCC" stroke-width="0.35" opacity="0.55"/>
  <line x1="29.2" y1="15" x2="29.2" y2="37" stroke="#CCC" stroke-width="0.35" opacity="0.55"/>
  <line x1="30.8" y1="15" x2="30.8" y2="37" stroke="#CCC" stroke-width="0.35" opacity="0.55"/>
  <line x1="32.4" y1="15" x2="32.4" y2="37" stroke="#CCC" stroke-width="0.35" opacity="0.55"/>

  <!-- Ukulele body — compact figure-8, rounder than guitar -->
  <path d="
    M 26,37
    C 26,34 23,33 21,33
    C 13,33  8,39  8,46
    C 8,50  10,53 13,55
    C 10,57  8,60  8,65
    C 8,73 14,78 30,78
    C 46,78 52,73 52,65
    C 52,60 50,57 47,55
    C 50,53 52,50 52,46
    C 52,39 47,33 39,33
    C 37,33 34,34 34,37
    C 34,39 32,40 30,40
    C 28,40 26,39 26,37 Z
  " fill="url(#bodyG)"/>

  <!-- Body binding — warm koa -->
  <path d="
    M 26,37 C 26,34 23,33 21,33 C 13,33 8,39 8,46 C 8,50 10,53 13,55
    C 10,57 8,60 8,65 C 8,73 14,78 30,78 C 46,78 52,73 52,65
    C 52,60 50,57 47,55 C 50,53 52,50 52,46 C 52,39 47,33 39,33
    C 37,33 34,34 34,37 C 34,39 32,40 30,40 C 28,40 26,39 26,37 Z
  " fill="none" stroke="#F0D870" stroke-width="1.1" opacity="0.25"/>

  <!-- Wood grain lines (koa characteristic) -->
  <path d="M 10,50 Q 16,48 20,54" stroke="rgba(200,140,40,0.12)" stroke-width="1" fill="none"/>
  <path d="M 10,56 Q 14,54 18,60" stroke="rgba(200,140,40,0.10)" stroke-width="1" fill="none"/>
  <path d="M 42,48 Q 46,50 50,54" stroke="rgba(200,140,40,0.10)" stroke-width="1" fill="none"/>

  <!-- Body sheen -->
  <ellipse cx="18" cy="48" rx="5" ry="7" fill="rgba(255,220,100,0.09)" transform="rotate(-15,18,48)"/>

  <!-- Sound hole (smaller than guitar) -->
  <circle cx="30" cy="62" r="9" fill="url(#holeG)"/>
  <circle cx="30" cy="62" r="10.2" fill="none" stroke="#E0B840" stroke-width="0.9" opacity="0.6"/>
  <circle cx="30" cy="62" r="11.5" fill="none" stroke="#F0D870" stroke-width="0.5" opacity="0.25"/>

  <!-- Bridge (small saddle style) -->
  <rect x="24" y="72" width="12" height="3.5" rx="1.75" fill="#241004"/>
  <rect x="25" y="73" width="10" height="1.5" rx="0.75" fill="#F0EBD0"/>

  <!-- 4 strings from neck to bridge -->
  <line x1="27.6" y1="37" x2="25.5" y2="73" stroke="#E8D890" stroke-width="0.35" opacity="0.45"/>
  <line x1="29.2" y1="37" x2="28"   y2="73" stroke="#E8D890" stroke-width="0.35" opacity="0.45"/>
  <line x1="30.8" y1="37" x2="31.5" y2="73" stroke="#E8D890" stroke-width="0.35" opacity="0.45"/>
  <line x1="32.4" y1="37" x2="34"   y2="73" stroke="#E8D890" stroke-width="0.35" opacity="0.45"/>

  <!-- Decorative koa pattern dot on body -->
  <circle cx="22" cy="46" r="1.5" fill="rgba(220,160,50,0.15)"/>
</svg>
