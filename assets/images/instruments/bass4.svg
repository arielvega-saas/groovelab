<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 82">
  <defs>
    <radialGradient id="bodyG" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#2A4870"/>
      <stop offset="55%"  stop-color="#14263C"/>
      <stop offset="100%" stop-color="#08101C"/>
    </radialGradient>
    <linearGradient id="neckG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B88C50"/>
      <stop offset="50%" stop-color="#7A5830"/>
      <stop offset="100%" stop-color="#B88C50"/>
    </linearGradient>
    <linearGradient id="puG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A3A50"/>
      <stop offset="100%" stop-color="#141E2C"/>
    </linearGradient>
  </defs>

  <!-- Headstock (J-bass asymmetric: 4 pegs, all on left side) -->
  <path d="M 20,1 L 38,1 Q 40,1 40,3 L 40,9 Q 40,13 36,13 L 20,13 Q 18,13 18,11 L 18,3 Q 18,1 20,1 Z"
        fill="#1A1828"/>
  <path d="M 20,1 L 38,1 Q 40,1 40,3 L 40,9 Q 40,13 36,13 L 20,13 Q 18,13 18,11 L 18,3 Q 18,1 20,1 Z"
        fill="none" stroke="#2E2A40" stroke-width="0.6"/>

  <!-- 4 pegs all on left side (J-bass style) -->
  <line x1="18" y1="3.5"  x2="12" y2="3.5"  stroke="#9E9E9E" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="11" cy="3.5"  r="2.8" fill="#9E9E9E"/>
  <circle cx="11" cy="3.5"  r="1.1" fill="rgba(255,255,255,0.3)"/>
  <line x1="18" y1="6.5"  x2="12" y2="6.5"  stroke="#9E9E9E" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="11" cy="6.5"  r="2.8" fill="#9E9E9E"/>
  <circle cx="11" cy="6.5"  r="1.1" fill="rgba(255,255,255,0.3)"/>
  <line x1="18" y1="9.5"  x2="12" y2="9.5"  stroke="#9E9E9E" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="11" cy="9.5"  r="2.8" fill="#9E9E9E"/>
  <circle cx="11" cy="9.5"  r="1.1" fill="rgba(255,255,255,0.3)"/>
  <line x1="18" y1="12.5" x2="12" y2="12.5" stroke="#9E9E9E" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="11" cy="12.5" r="2.8" fill="#9E9E9E"/>
  <circle cx="11" cy="12.5" r="1.1" fill="rgba(255,255,255,0.3)"/>

  <!-- Nut -->
  <rect x="25" y="14" width="10" height="2" rx="1" fill="#E8E0D0"/>

  <!-- Neck (slightly wider for bass) -->
  <rect x="25" y="16" width="10" height="28" rx="2" fill="url(#neckG)"/>
  <rect x="25" y="16" width="10" height="28" rx="2" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>

  <!-- Frets (5 for bass) -->
  <line x1="25.5" y1="21" x2="34.5" y2="21" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="25.5" y1="26" x2="34.5" y2="26" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="25.5" y1="31" x2="34.5" y2="31" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="25.5" y1="36" x2="34.5" y2="36" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="25.5" y1="41" x2="34.5" y2="41" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>

  <!-- 4 strings on neck -->
  <line x1="27.2" y1="16" x2="27.2" y2="44" stroke="#CCC" stroke-width="0.42" opacity="0.55"/>
  <line x1="29.1" y1="16" x2="29.1" y2="44" stroke="#CCC" stroke-width="0.48" opacity="0.55"/>
  <line x1="30.9" y1="16" x2="30.9" y2="44" stroke="#CCC" stroke-width="0.55" opacity="0.55"/>
  <line x1="32.8" y1="16" x2="32.8" y2="44" stroke="#CCC" stroke-width="0.62" opacity="0.55"/>

  <!-- J-Bass body (offset double-cutaway) -->
  <path d="
    M 25,44
    C 22,44 16,42 12,44
    C 6,47  4,52  4,58
    C 4,64  7,68  11,70
    C 8,72  6,76  6,80
    L 54,80
    C 54,76 52,72 49,70
    C 53,68 56,64 56,58
    C 56,52 54,46 48,44
    C 44,43 40,44 40,44
    C 40,45 37,46 35,44
    L 25,44 Z
  " fill="url(#bodyG)"/>

  <!-- Body edge highlight -->
  <path d="
    M 25,44 C 22,44 16,42 12,44 C 6,47 4,52 4,58 C 4,64 7,68 11,70
    C 8,72 6,76 6,80 L 54,80 C 54,76 52,72 49,70 C 53,68 56,64 56,58
    C 56,52 54,46 48,44 C 44,43 40,44 40,44 C 40,45 37,46 35,44 L 25,44 Z
  " fill="none" stroke="rgba(100,150,220,0.18)" stroke-width="1.1"/>

  <!-- Body surface sheen -->
  <ellipse cx="16" cy="56" rx="8" ry="12" fill="rgba(80,130,200,0.07)" transform="rotate(-10,16,56)"/>

  <!-- Pickup 1 (neck position) -->
  <rect x="20" y="54" width="20" height="5" rx="2" fill="url(#puG)"/>
  <rect x="20" y="54" width="20" height="5" rx="2" fill="none" stroke="rgba(100,160,255,0.2)" stroke-width="0.5"/>
  <circle cx="24" cy="56.5" r="1.3" fill="#4488AA" opacity="0.7"/>
  <circle cx="27" cy="56.5" r="1.3" fill="#4488AA" opacity="0.7"/>
  <circle cx="30" cy="56.5" r="1.3" fill="#4488AA" opacity="0.7"/>
  <circle cx="33" cy="56.5" r="1.3" fill="#4488AA" opacity="0.7"/>

  <!-- Pickup 2 (bridge position) -->
  <rect x="21" y="62" width="18" height="4.5" rx="2" fill="url(#puG)"/>
  <rect x="21" y="62" width="18" height="4.5" rx="2" fill="none" stroke="rgba(100,160,255,0.2)" stroke-width="0.5"/>
  <circle cx="25" cy="64.2" r="1.2" fill="#4488AA" opacity="0.7"/>
  <circle cx="28" cy="64.2" r="1.2" fill="#4488AA" opacity="0.7"/>
  <circle cx="31" cy="64.2" r="1.2" fill="#4488AA" opacity="0.7"/>
  <circle cx="34" cy="64.2" r="1.2" fill="#4488AA" opacity="0.7"/>

  <!-- Bridge -->
  <rect x="22" y="71" width="16" height="5" rx="2" fill="#1A2030"/>
  <rect x="23" y="72.5" width="14" height="2" rx="1" fill="#8090A0"/>
  <!-- String saddles -->
  <circle cx="25.5" cy="73.5" r="1" fill="#6080A0" opacity="0.8"/>
  <circle cx="28"   cy="73.5" r="1" fill="#6080A0" opacity="0.8"/>
  <circle cx="30.5" cy="73.5" r="1" fill="#6080A0" opacity="0.8"/>
  <circle cx="33"   cy="73.5" r="1" fill="#6080A0" opacity="0.8"/>

  <!-- Strap pin bottom -->
  <circle cx="30" cy="80.5" r="2" fill="#707080" opacity="0.8"/>

  <!-- Strings from neck to bridge -->
  <line x1="27.2" y1="44" x2="25.5" y2="72.5" stroke="#CCC" stroke-width="0.42" opacity="0.38"/>
  <line x1="29.1" y1="44" x2="28"   y2="72.5" stroke="#CCC" stroke-width="0.48" opacity="0.38"/>
  <line x1="30.9" y1="44" x2="30.5" y2="72.5" stroke="#CCC" stroke-width="0.55" opacity="0.38"/>
  <line x1="32.8" y1="44" x2="33"   y2="72.5" stroke="#CCC" stroke-width="0.62" opacity="0.38"/>
</svg>
