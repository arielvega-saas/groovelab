<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 82">
  <defs>
    <!-- Sunburst gradient for Drop D — darker center, amber edges -->
    <radialGradient id="bodyG" cx="50%" cy="55%" r="50%">
      <stop offset="0%"   stop-color="#5C2C0A"/>
      <stop offset="40%"  stop-color="#A85820"/>
      <stop offset="75%"  stop-color="#D48030"/>
      <stop offset="100%" stop-color="#8C4818"/>
    </radialGradient>
    <linearGradient id="neckG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C89858"/>
      <stop offset="50%" stop-color="#8A5E30"/>
      <stop offset="100%" stop-color="#C89858"/>
    </linearGradient>
    <radialGradient id="holeG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#080C18"/>
    </radialGradient>
  </defs>

  <!-- Headstock (slightly darker for Drop D distinction) -->
  <rect x="15" y="1" width="30" height="12" rx="3.5" fill="#180A04"/>
  <rect x="15" y="1" width="30" height="12" rx="3.5" fill="none" stroke="#3A1808" stroke-width="0.6"/>

  <!-- Tuning pegs LEFT -->
  <line x1="15" y1="4"  x2="9" y2="4"  stroke="#B89020" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="8"  cy="4"  r="2.8" fill="#B89020"/>
  <circle cx="8"  cy="4"  r="1.1" fill="rgba(255,255,255,0.35)"/>
  <line x1="15" y1="7"  x2="9" y2="7"  stroke="#B89020" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="8"  cy="7"  r="2.8" fill="#B89020"/>
  <circle cx="8"  cy="7"  r="1.1" fill="rgba(255,255,255,0.35)"/>
  <line x1="15" y1="10" x2="9" y2="10" stroke="#B89020" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="8"  cy="10" r="2.8" fill="#B89020"/>
  <circle cx="8"  cy="10" r="1.1" fill="rgba(255,255,255,0.35)"/>

  <!-- Tuning pegs RIGHT -->
  <line x1="45" y1="4"  x2="51" y2="4"  stroke="#B89020" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="52" cy="4"  r="2.8" fill="#B89020"/>
  <circle cx="52" cy="4"  r="1.1" fill="rgba(255,255,255,0.35)"/>
  <line x1="45" y1="7"  x2="51" y2="7"  stroke="#B89020" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="52" cy="7"  r="2.8" fill="#B89020"/>
  <circle cx="52" cy="7"  r="1.1" fill="rgba(255,255,255,0.35)"/>
  <line x1="45" y1="10" x2="51" y2="10" stroke="#B89020" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="52" cy="10" r="2.8" fill="#B89020"/>
  <circle cx="52" cy="10" r="1.1" fill="rgba(255,255,255,0.35)"/>

  <!-- Nut -->
  <rect x="25" y="13" width="10" height="2" rx="1" fill="#F0E8D0"/>

  <!-- Neck -->
  <rect x="25" y="15" width="10" height="26" rx="2" fill="url(#neckG)"/>
  <rect x="25" y="15" width="10" height="26" rx="2" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>

  <!-- Frets -->
  <line x1="25.5" y1="20" x2="34.5" y2="20" stroke="#C0A860" stroke-width="0.7" opacity="0.65"/>
  <line x1="25.5" y1="25" x2="34.5" y2="25" stroke="#C0A860" stroke-width="0.7" opacity="0.65"/>
  <line x1="25.5" y1="30" x2="34.5" y2="30" stroke="#C0A860" stroke-width="0.7" opacity="0.65"/>
  <line x1="25.5" y1="35" x2="34.5" y2="35" stroke="#C0A860" stroke-width="0.7" opacity="0.65"/>

  <!-- Strings on neck (6, slightly heavier low string for Drop D) -->
  <line x1="26.8" y1="15" x2="26.8" y2="41" stroke="#CCC" stroke-width="0.50" opacity="0.55"/>
  <line x1="28.1" y1="15" x2="28.1" y2="41" stroke="#CCC" stroke-width="0.30" opacity="0.55"/>
  <line x1="29.4" y1="15" x2="29.4" y2="41" stroke="#CCC" stroke-width="0.33" opacity="0.55"/>
  <line x1="30.6" y1="15" x2="30.6" y2="41" stroke="#CCC" stroke-width="0.36" opacity="0.55"/>
  <line x1="31.9" y1="15" x2="31.9" y2="41" stroke="#CCC" stroke-width="0.40" opacity="0.55"/>
  <line x1="33.2" y1="15" x2="33.2" y2="41" stroke="#CCC" stroke-width="0.44" opacity="0.55"/>

  <!-- Guitar body — same dreadnought shape, sunburst finish -->
  <path d="
    M 25,41 C 25,38 21,37 18,37 C 8,37 2,44 2,52 C 2,57 4,60 7,62
    C 4,64 2,67 2,72 C 2,79 10,82 30,82 C 50,82 58,79 58,72
    C 58,67 56,64 53,62 C 56,60 58,57 58,52 C 58,44 52,37 42,37
    C 39,37 35,38 35,41 C 35,43 33,44 30,44 C 27,44 25,43 25,41 Z
  " fill="url(#bodyG)"/>

  <!-- Body binding — warmer amber for sunburst -->
  <path d="
    M 25,41 C 25,38 21,37 18,37 C 8,37 2,44 2,52 C 2,57 4,60 7,62
    C 4,64 2,67 2,72 C 2,79 10,82 30,82 C 50,82 58,79 58,72
    C 58,67 56,64 53,62 C 56,60 58,57 58,52 C 58,44 52,37 42,37
    C 39,37 35,38 35,41 C 35,43 33,44 30,44 C 27,44 25,43 25,41 Z
  " fill="none" stroke="#E8C060" stroke-width="1.1" opacity="0.22"/>

  <!-- Sunburst highlight ring -->
  <ellipse cx="30" cy="63" rx="26" ry="18" fill="none" stroke="rgba(200,120,30,0.08)" stroke-width="6"/>

  <!-- Sound hole -->
  <circle cx="30" cy="66" r="11" fill="url(#holeG)"/>
  <circle cx="30" cy="66" r="12.3" fill="none" stroke="#B89020" stroke-width="0.9" opacity="0.55"/>
  <circle cx="30" cy="66" r="13.5" fill="none" stroke="#F0E8D0" stroke-width="0.4" opacity="0.2"/>

  <!-- Bridge -->
  <rect x="21" y="76" width="18" height="4" rx="2" fill="#140802"/>
  <rect x="22" y="77.2" width="16" height="1.6" rx="0.8" fill="#F0E8D0"/>

  <!-- Bridge pins -->
  <circle cx="24.5" cy="79.5" r="1.1" fill="#B89020" opacity="0.75"/>
  <circle cx="27"   cy="79.5" r="1.1" fill="#B89020" opacity="0.75"/>
  <circle cx="29.5" cy="79.5" r="1.1" fill="#B89020" opacity="0.75"/>
  <circle cx="32"   cy="79.5" r="1.1" fill="#B89020" opacity="0.75"/>
  <circle cx="34.5" cy="79.5" r="1.1" fill="#B89020" opacity="0.75"/>

  <!-- "D" badge in lower bout corner to indicate Drop D -->
  <circle cx="49" cy="76" r="6" fill="rgba(30,15,5,0.85)"/>
  <circle cx="49" cy="76" r="6" fill="none" stroke="#B89020" stroke-width="0.8" opacity="0.6"/>
  <text x="49" y="79.5" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#D4AF37" text-anchor="middle" opacity="0.9">D</text>

  <!-- Strings from neck to bridge -->
  <line x1="26.8" y1="41" x2="23"   y2="77.2" stroke="#CCC" stroke-width="0.50" opacity="0.38"/>
  <line x1="28.1" y1="41" x2="25"   y2="77.2" stroke="#CCC" stroke-width="0.30" opacity="0.38"/>
  <line x1="29.4" y1="41" x2="27.5" y2="77.2" stroke="#CCC" stroke-width="0.33" opacity="0.38"/>
  <line x1="30.6" y1="41" x2="30"   y2="77.2" stroke="#CCC" stroke-width="0.36" opacity="0.38"/>
  <line x1="31.9" y1="41" x2="32.5" y2="77.2" stroke="#CCC" stroke-width="0.40" opacity="0.38"/>
  <line x1="33.2" y1="41" x2="35"   y2="77.2" stroke="#CCC" stroke-width="0.44" opacity="0.38"/>
</svg>
