<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 82">
  <defs>
    <linearGradient id="sBodyG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C88010"/>
      <stop offset="40%" stop-color="#E8C058"/>
      <stop offset="70%" stop-color="#C09020"/>
      <stop offset="100%" stop-color="#906800"/>
    </linearGradient>
    <linearGradient id="sBellG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C08010"/>
      <stop offset="100%" stop-color="#7A5000"/>
    </linearGradient>
    <radialGradient id="padG" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#F0E898"/>
      <stop offset="100%" stop-color="#C0A040"/>
    </radialGradient>
  </defs>

  <!-- Mouthpiece at top-left (dark rubber/resin) -->
  <path d="M 8,3 L 14,3 L 15,8 L 7,8 Z" fill="#202020"/>
  <rect x="7.5" y="8" width="7" height="2" rx="1" fill="#303030"/>
  <!-- Ligature (metal band) -->
  <rect x="7.5" y="6.5" width="7" height="1.2" rx="0.6" fill="#888888"/>
  <!-- Reed hint -->
  <path d="M 8.5,4 L 10,4 L 10.5,3.5 L 9,3.5 Z" fill="rgba(200,180,90,0.5)"/>

  <!-- Neck (S-curve from mouthpiece to body, thin brass tube) -->
  <path d="M 11,10 C 12,14 16,17 22,19 C 28,21 32,23 34,27"
        fill="none" stroke="#C89020" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Neck highlight -->
  <path d="M 11,10 C 12,14 16,17 22,19 C 28,21 32,23 34,27"
        fill="none" stroke="rgba(255,220,100,0.22)" stroke-width="2" stroke-linecap="round"/>

  <!-- Octave key on neck -->
  <circle cx="17" cy="15" r="2.5" fill="#B07808"/>
  <circle cx="17" cy="15" r="1.8" fill="url(#padG)"/>

  <!-- Main body (slightly tapered, wider at bottom — conical saxophone shape) -->
  <path d="M 31.5,26 L 28,68 L 37,68 L 38,26 Z" fill="url(#sBodyG)"/>
  <!-- Body highlight edge -->
  <path d="M 34.5,28 L 33,66" stroke="rgba(255,220,80,0.18)" stroke-width="2" stroke-linecap="round"/>
  <!-- Body shadow edge -->
  <path d="M 30,28 L 27.5,66" stroke="rgba(0,0,0,0.12)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Keypads LEFT side -->
  <circle cx="26.5" cy="34" r="3.5" fill="#A87010" stroke="#C89020" stroke-width="0.7"/>
  <circle cx="26.5" cy="34" r="2.6" fill="url(#padG)"/>

  <circle cx="25.8" cy="42" r="3.2" fill="#A87010" stroke="#C89020" stroke-width="0.7"/>
  <circle cx="25.8" cy="42" r="2.3" fill="url(#padG)"/>

  <circle cx="25.5" cy="49.5" r="2.8" fill="#A87010" stroke="#C89020" stroke-width="0.7"/>
  <circle cx="25.5" cy="49.5" r="2" fill="url(#padG)"/>

  <circle cx="26" cy="56.5" r="2.4" fill="#A87010" stroke="#C89020" stroke-width="0.7"/>
  <circle cx="26" cy="56.5" r="1.7" fill="url(#padG)"/>

  <circle cx="26.5" cy="62.5" r="2" fill="#A87010" stroke="#C89020" stroke-width="0.7"/>
  <circle cx="26.5" cy="62.5" r="1.4" fill="url(#padG)"/>

  <!-- Keypads RIGHT side -->
  <circle cx="38.5" cy="31" r="3" fill="#A87010" stroke="#C89020" stroke-width="0.7"/>
  <circle cx="38.5" cy="31" r="2.2" fill="url(#padG)"/>

  <circle cx="38.8" cy="39" r="2.6" fill="#A87010" stroke="#C89020" stroke-width="0.7"/>
  <circle cx="38.8" cy="39" r="1.9" fill="url(#padG)"/>

  <circle cx="38.8" cy="46.5" r="2.2" fill="#A87010" stroke="#C89020" stroke-width="0.7"/>
  <circle cx="38.8" cy="46.5" r="1.6" fill="url(#padG)"/>

  <circle cx="38.5" cy="53" r="1.8" fill="#A87010" stroke="#C89020" stroke-width="0.7"/>
  <circle cx="38.5" cy="53" r="1.3" fill="url(#padG)"/>

  <!-- Key rod lines (mechanical linkage) -->
  <line x1="26" y1="30" x2="27" y2="65" stroke="#B88010" stroke-width="0.6" opacity="0.4"/>
  <line x1="38.5" y1="28" x2="39" y2="56" stroke="#B88010" stroke-width="0.6" opacity="0.4"/>

  <!-- Bottom bow (U-turn connecting body to bell) -->
  <path d="M 28,68 Q 20,73 24,79 Q 27,83 36,82 Q 45,81 46,74 L 37,68" fill="url(#sBellG)"/>
  <!-- Bottom bow highlight -->
  <path d="M 28.5,68 Q 21,73 25,78" fill="none" stroke="rgba(255,210,80,0.2)" stroke-width="2"/>

  <!-- Bell interior opening -->
  <ellipse cx="36" cy="80" rx="9" ry="3.5" fill="#1A0C00" opacity="0.75"/>
  <!-- Bell rim highlight -->
  <path d="M 27,81 Q 36,84 45,81" fill="none" stroke="#E0A030" stroke-width="0.9" opacity="0.6"/>

  <!-- Key guard (metal tab bottom) -->
  <rect x="39" y="63" width="7" height="3.5" rx="1.75" fill="#B07010"/>

  <!-- Decorative key ring near bottom -->
  <rect x="27.5" y="64" width="9" height="2" rx="1" fill="#C08010" opacity="0.7"/>
</svg>
