<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 82">
  <defs>
    <radialGradient id="vBodyG" cx="42%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#C84E28"/>
      <stop offset="55%" stop-color="#7A2006"/>
      <stop offset="100%" stop-color="#3C0E02"/>
    </radialGradient>
    <linearGradient id="vNeckG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A84020"/>
      <stop offset="50%" stop-color="#6A1E06"/>
      <stop offset="100%" stop-color="#A84020"/>
    </linearGradient>
  </defs>

  <!-- Scroll (carved curl at top of pegbox) -->
  <path d="M 27,1 C 24,1 22,3 22,5 C 22,8 24.5,9.5 27,9 C 29,8.5 30,7 29.5,5.5 C 29,4 27.5,3.5 27,4 C 26.5,4.5 26.5,5.5 27.5,6"
        fill="none" stroke="#3A0C02" stroke-width="3" stroke-linecap="round"/>
  <path d="M 22,5 Q 22,9.5 38,9.5" fill="none" stroke="#2A0A02" stroke-width="4" stroke-linecap="round"/>

  <!-- Pegbox -->
  <rect x="22" y="9" width="16" height="13" rx="2" fill="#220A02"/>
  <rect x="22" y="9" width="16" height="13" rx="2" fill="none" stroke="#4A1406" stroke-width="0.5"/>

  <!-- Tuning pegs — oval friction style, 2 left + 2 right -->
  <ellipse cx="19" cy="12" rx="3.5" ry="1.8" fill="#A84020"/>
  <ellipse cx="19" cy="12" rx="1.5" ry="0.8" fill="rgba(255,160,80,0.45)"/>
  <ellipse cx="19" cy="18" rx="3.5" ry="1.8" fill="#A84020"/>
  <ellipse cx="19" cy="18" rx="1.5" ry="0.8" fill="rgba(255,160,80,0.45)"/>
  <ellipse cx="41" cy="13" rx="3.5" ry="1.8" fill="#A84020"/>
  <ellipse cx="41" cy="13" rx="1.5" ry="0.8" fill="rgba(255,160,80,0.45)"/>
  <ellipse cx="41" cy="19" rx="3.5" ry="1.8" fill="#A84020"/>
  <ellipse cx="41" cy="19" rx="1.5" ry="0.8" fill="rgba(255,160,80,0.45)"/>

  <!-- Nut -->
  <rect x="25" y="22" width="10" height="2" rx="1" fill="#F0E0C8"/>

  <!-- Neck (tapers slightly from nut to body) -->
  <path d="M 25,24 L 23,37 L 37,37 L 35,24 Z" fill="url(#vNeckG)"/>

  <!-- 4 strings on neck -->
  <line x1="27.5" y1="24" x2="26.5" y2="37" stroke="#D0D0D0" stroke-width="0.28" opacity="0.6"/>
  <line x1="29.2" y1="24" x2="28.5" y2="37" stroke="#D0D0D0" stroke-width="0.30" opacity="0.6"/>
  <line x1="30.8" y1="24" x2="31.5" y2="37" stroke="#C8C8C8" stroke-width="0.30" opacity="0.6"/>
  <line x1="32.5" y1="24" x2="33.5" y2="37" stroke="#C8C8C8" stroke-width="0.28" opacity="0.6"/>

  <!-- Violin body: upper bout + C-bouts + lower bout -->
  <path d="
    M 23,37
    C 23,33 18,30 13,32
    C 7,35 5,42 8,48
    C 9,52 13,55 16,56
    C 12,59 9,64 11,70
    C 13,76 20,80 30,80
    C 40,80 47,76 49,70
    C 51,64 48,59 44,56
    C 47,55 51,52 52,48
    C 55,42 53,35 47,32
    C 42,30 37,33 37,37
    C 37,39.5 34,41 30,41
    C 26,41 23,39.5 23,37 Z
  " fill="url(#vBodyG)"/>

  <!-- Body binding (warm gold edge) -->
  <path d="
    M 23,37 C 23,33 18,30 13,32 C 7,35 5,42 8,48 C 9,52 13,55 16,56
    C 12,59 9,64 11,70 C 13,76 20,80 30,80 C 40,80 47,76 49,70
    C 51,64 48,59 44,56 C 47,55 51,52 52,48 C 55,42 53,35 47,32
    C 42,30 37,33 37,37 C 37,39.5 34,41 30,41 C 26,41 23,39.5 23,37 Z
  " fill="none" stroke="rgba(220,160,50,0.22)" stroke-width="0.9"/>

  <!-- Purfling (dark inner inlay line) -->
  <path d="
    M 23.6,37 C 23.6,33.5 19,31 14,33 C 8.5,35.5 6.5,42 9.5,48
    C 10.5,52 14,54.5 16.5,55.5 C 13,58.5 10,64 12,70
    C 14,75.5 20.5,79 30,79 C 39.5,79 46,75.5 48,70
    C 50,64 47,58.5 43.5,55.5 C 46,54.5 49.5,52 50.5,48
    C 53.5,42 51.5,35.5 46,33 C 41,31 36.4,33.5 36.4,37
    C 36.4,39.5 33.5,41.5 30,41.5 C 26.5,41.5 23.6,39.5 23.6,37 Z
  " fill="none" stroke="rgba(10,2,0,0.55)" stroke-width="0.55"/>

  <!-- Light reflection upper-left -->
  <ellipse cx="15" cy="44" rx="4" ry="6.5" fill="rgba(210,100,30,0.14)" transform="rotate(-18,15,44)"/>

  <!-- f-hole LEFT -->
  <path d="M 15.5,51 C 15,48 15,45 15.5,42.5" fill="none" stroke="#100402" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="15.5" cy="42" r="1.4" fill="#100402"/>
  <circle cx="15.5" cy="51.5" r="1.4" fill="#100402"/>
  <line x1="13.5" y1="47" x2="17.5" y2="47" stroke="#100402" stroke-width="0.9" stroke-linecap="round"/>

  <!-- f-hole RIGHT -->
  <path d="M 44.5,51 C 45,48 45,45 44.5,42.5" fill="none" stroke="#100402" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="44.5" cy="42" r="1.4" fill="#100402"/>
  <circle cx="44.5" cy="51.5" r="1.4" fill="#100402"/>
  <line x1="42.5" y1="47" x2="46.5" y2="47" stroke="#100402" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Bridge (thin arched) -->
  <path d="M 22.5,59 C 25,57 28,56.5 30,56.5 C 32,56.5 35,57 37.5,59 L 37.5,60 C 35,58 32,57.5 30,57.5 C 28,57.5 25,58 22.5,60 Z" fill="#C09050"/>

  <!-- 4 strings (nut to tailpiece) -->
  <line x1="27.5" y1="24" x2="27" y2="71" stroke="#D0D0D0" stroke-width="0.28" opacity="0.5"/>
  <line x1="29.2" y1="24" x2="29" y2="71" stroke="#D0D0D0" stroke-width="0.30" opacity="0.5"/>
  <line x1="30.8" y1="24" x2="31" y2="71" stroke="#C8C8C8" stroke-width="0.30" opacity="0.5"/>
  <line x1="32.5" y1="24" x2="33" y2="71" stroke="#C8C8C8" stroke-width="0.28" opacity="0.5"/>

  <!-- Tailpiece -->
  <path d="M 26.5,71 L 25,77 Q 30,79 35,77 L 33.5,71 Q 30,74 26.5,71 Z" fill="#180802"/>
  <line x1="26.5" y1="71" x2="33.5" y2="71" stroke="#F0E0C0" stroke-width="0.6" opacity="0.4"/>

  <!-- Fine tuners (4 small gold bars) -->
  <rect x="26.8" y="72" width="1.8" height="2.8" rx="0.9" fill="#C8A028" opacity="0.75"/>
  <rect x="29.0" y="72" width="1.8" height="2.8" rx="0.9" fill="#C8A028" opacity="0.75"/>
  <rect x="31.2" y="72" width="1.8" height="2.8" rx="0.9" fill="#C8A028" opacity="0.65"/>
  <rect x="28.1" y="71.5" width="1.8" height="2.5" rx="0.9" fill="#C8A028" opacity="0.6"/>

  <!-- Chinrest (left of tailpiece) -->
  <path d="M 10,69 Q 14,67 21,69 Q 19.5,75 12.5,74.5 Z" fill="#281004" opacity="0.88"/>
  <path d="M 10,69 Q 14,67 21,69 Q 19.5,75 12.5,74.5 Z" fill="none" stroke="#5A1A08" stroke-width="0.5"/>

  <!-- End button -->
  <circle cx="30" cy="80" r="1.5" fill="#A05828"/>
  <circle cx="30" cy="80" r="0.6" fill="rgba(255,180,80,0.4)"/>
</svg>
