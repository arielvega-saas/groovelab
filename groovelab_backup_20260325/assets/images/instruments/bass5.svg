<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 82">
  <defs>
    <radialGradient id="bodyG" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#1E4055"/>
      <stop offset="55%"  stop-color="#0E2030"/>
      <stop offset="100%" stop-color="#060E18"/>
    </radialGradient>
    <linearGradient id="neckG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B88C50"/>
      <stop offset="50%" stop-color="#7A5830"/>
      <stop offset="100%" stop-color="#B88C50"/>
    </linearGradient>
    <linearGradient id="puG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3040"/>
      <stop offset="100%" stop-color="#0C1820"/>
    </linearGradient>
  </defs>

  <!-- Headstock — 3+2 layout for 5-string -->
  <path d="M 18,1 L 40,1 Q 42,1 42,3 L 42,10 Q 42,14 38,14 L 18,14 Q 16,14 16,12 L 16,3 Q 16,1 18,1 Z"
        fill="#14182A"/>
  <path d="M 18,1 L 40,1 Q 42,1 42,3 L 42,10 Q 42,14 38,14 L 18,14 Q 16,14 16,12 L 16,3 Q 16,1 18,1 Z"
        fill="none" stroke="#202838" stroke-width="0.6"/>

  <!-- 3 pegs on LEFT -->
  <line x1="16" y1="3.5"  x2="10" y2="3.5"  stroke="#78A8C0" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="9"  cy="3.5"  r="2.8" fill="#78A8C0"/>
  <circle cx="9"  cy="3.5"  r="1.1" fill="rgba(255,255,255,0.3)"/>
  <line x1="16" y1="7"    x2="10" y2="7"    stroke="#78A8C0" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="9"  cy="7"    r="2.8" fill="#78A8C0"/>
  <circle cx="9"  cy="7"    r="1.1" fill="rgba(255,255,255,0.3)"/>
  <line x1="16" y1="10.5" x2="10" y2="10.5" stroke="#78A8C0" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="9"  cy="10.5" r="2.8" fill="#78A8C0"/>
  <circle cx="9"  cy="10.5" r="1.1" fill="rgba(255,255,255,0.3)"/>

  <!-- 2 pegs on RIGHT -->
  <line x1="42" y1="5"  x2="48" y2="5"  stroke="#78A8C0" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="49" cy="5"  r="2.8" fill="#78A8C0"/>
  <circle cx="49" cy="5"  r="1.1" fill="rgba(255,255,255,0.3)"/>
  <line x1="42" y1="9"  x2="48" y2="9"  stroke="#78A8C0" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="49" cy="9"  r="2.8" fill="#78A8C0"/>
  <circle cx="49" cy="9"  r="1.1" fill="rgba(255,255,255,0.3)"/>

  <!-- Nut (wider for 5 strings) -->
  <rect x="24" y="15" width="12" height="2" rx="1" fill="#E8E0D0"/>

  <!-- Neck (slightly wider) -->
  <rect x="24" y="17" width="12" height="27" rx="2" fill="url(#neckG)"/>
  <rect x="24" y="17" width="12" height="27" rx="2" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>

  <!-- Frets -->
  <line x1="24.5" y1="22" x2="35.5" y2="22" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="24.5" y1="27" x2="35.5" y2="27" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="24.5" y1="32" x2="35.5" y2="32" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="24.5" y1="37" x2="35.5" y2="37" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>
  <line x1="24.5" y1="42" x2="35.5" y2="42" stroke="#C0A060" stroke-width="0.7" opacity="0.6"/>

  <!-- 5 strings on neck -->
  <line x1="25.8" y1="17" x2="25.8" y2="44" stroke="#CCC" stroke-width="0.65" opacity="0.55"/>
  <line x1="27.5" y1="17" x2="27.5" y2="44" stroke="#CCC" stroke-width="0.45" opacity="0.55"/>
  <line x1="29.5" y1="17" x2="29.5" y2="44" stroke="#CCC" stroke-width="0.38" opacity="0.55"/>
  <line x1="31.5" y1="17" x2="31.5" y2="44" stroke="#CCC" stroke-width="0.32" opacity="0.55"/>
  <line x1="33.2" y1="17" x2="33.2" y2="44" stroke="#CCC" stroke-width="0.28" opacity="0.55"/>

  <!-- J-Bass body (same offset asymmetric shape) -->
  <path d="
    M 24,44 C 21,44 15,42 11,44 C 5,47 3,52 3,58 C 3,64 6,68 10,70
    C 7,72 5,76 5,80 L 55,80 C 55,76 53,72 50,70 C 54,68 57,64 57,58
    C 57,52 55,46 49,44 C 45,43 41,44 41,44 C 41,45 38,46 36,44 L 24,44 Z
  " fill="url(#bodyG)"/>

  <!-- Body edge highlight — teal tint for 5-string -->
  <path d="
    M 24,44 C 21,44 15,42 11,44 C 5,47 3,52 3,58 C 3,64 6,68 10,70
    C 7,72 5,76 5,80 L 55,80 C 55,76 53,72 50,70 C 54,68 57,64 57,58
    C 57,52 55,46 49,44 C 45,43 41,44 41,44 C 41,45 38,46 36,44 L 24,44 Z
  " fill="none" stroke="rgba(80,180,200,0.18)" stroke-width="1.1"/>

  <!-- Body sheen -->
  <ellipse cx="14" cy="57" rx="8" ry="12" fill="rgba(60,140,180,0.07)" transform="rotate(-10,14,57)"/>

  <!-- Pickup 1 (neck) — slightly wider for 5-string -->
  <rect x="18" y="54" width="24" height="5" rx="2" fill="url(#puG)"/>
  <rect x="18" y="54" width="24" height="5" rx="2" fill="none" stroke="rgba(80,200,220,0.2)" stroke-width="0.5"/>
  <circle cx="22" cy="56.5" r="1.2" fill="#3898B0" opacity="0.7"/>
  <circle cx="25" cy="56.5" r="1.2" fill="#3898B0" opacity="0.7"/>
  <circle cx="28" cy="56.5" r="1.2" fill="#3898B0" opacity="0.7"/>
  <circle cx="31" cy="56.5" r="1.2" fill="#3898B0" opacity="0.7"/>
  <circle cx="34" cy="56.5" r="1.2" fill="#3898B0" opacity="0.7"/>

  <!-- Pickup 2 (bridge) -->
  <rect x="19" y="62" width="22" height="4.5" rx="2" fill="url(#puG)"/>
  <rect x="19" y="62" width="22" height="4.5" rx="2" fill="none" stroke="rgba(80,200,220,0.2)" stroke-width="0.5"/>
  <circle cx="23" cy="64.2" r="1.1" fill="#3898B0" opacity="0.7"/>
  <circle cx="26" cy="64.2" r="1.1" fill="#3898B0" opacity="0.7"/>
  <circle cx="29" cy="64.2" r="1.1" fill="#3898B0" opacity="0.7"/>
  <circle cx="32" cy="64.2" r="1.1" fill="#3898B0" opacity="0.7"/>
  <circle cx="35" cy="64.2" r="1.1" fill="#3898B0" opacity="0.7"/>

  <!-- Bridge -->
  <rect x="20" y="71" width="20" height="5" rx="2" fill="#141C28"/>
  <rect x="21" y="72.5" width="18" height="2" rx="1" fill="#6090A8"/>
  <circle cx="23.5" cy="73.5" r="1"   fill="#4880A0" opacity="0.8"/>
  <circle cx="26.5" cy="73.5" r="1"   fill="#4880A0" opacity="0.8"/>
  <circle cx="29.5" cy="73.5" r="1"   fill="#4880A0" opacity="0.8"/>
  <circle cx="32.5" cy="73.5" r="1"   fill="#4880A0" opacity="0.8"/>
  <circle cx="35.5" cy="73.5" r="1"   fill="#4880A0" opacity="0.8"/>

  <!-- Strap pin -->
  <circle cx="30" cy="80.5" r="2" fill="#606878" opacity="0.8"/>

  <!-- Strings from neck to bridge -->
  <line x1="25.8" y1="44" x2="23.5" y2="72.5" stroke="#CCC" stroke-width="0.65" opacity="0.38"/>
  <line x1="27.5" y1="44" x2="26.5" y2="72.5" stroke="#CCC" stroke-width="0.45" opacity="0.38"/>
  <line x1="29.5" y1="44" x2="29.5" y2="72.5" stroke="#CCC" stroke-width="0.38" opacity="0.38"/>
  <line x1="31.5" y1="44" x2="32.5" y2="72.5" stroke="#CCC" stroke-width="0.32" opacity="0.38"/>
  <line x1="33.2" y1="44" x2="35.5" y2="72.5" stroke="#CCC" stroke-width="0.28" opacity="0.38"/>
</svg>
