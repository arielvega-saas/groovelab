<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 82">
  <defs>
    <linearGradient id="pBodyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="pKeyWG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <linearGradient id="pKeyBG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#242424"/>
      <stop offset="100%" stop-color="#0C0C0C"/>
    </linearGradient>
    <radialGradient id="pSheen" cx="35%" cy="20%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Main piano body (lacquered black) -->
  <rect x="3" y="2" width="54" height="78" rx="3" fill="url(#pBodyG)"/>
  <rect x="3" y="2" width="54" height="78" rx="3" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
  <!-- Lacquer sheen -->
  <rect x="4" y="3" width="52" height="36" rx="2.5" fill="url(#pSheen)"/>
  <!-- Body edge highlight -->
  <line x1="4" y1="3" x2="56" y2="3" stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>

  <!-- Piano lid (top closed panel) -->
  <rect x="3" y="2" width="54" height="8" rx="3" fill="#1E1E1E"/>
  <rect x="3" y="2" width="54" height="8" rx="3" fill="none" stroke="#333" stroke-width="0.5"/>
  <line x1="4" y1="3.5" x2="56" y2="3.5" stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>

  <!-- Music desk (panel for sheet music) -->
  <rect x="8" y="10" width="44" height="18" rx="2" fill="#1A1A1A"/>
  <rect x="9" y="11" width="42" height="16" rx="1.5" fill="#141414"/>
  <!-- Music desk sheet slots -->
  <rect x="12" y="12" width="14" height="13" rx="1" fill="rgba(240,235,218,0.9)"/>
  <rect x="28" y="12" width="14" height="13" rx="1" fill="rgba(240,235,218,0.9)"/>

  <!-- Staff lines on left sheet -->
  <line x1="13.5" y1="14"   x2="24.5" y2="14"   stroke="rgba(0,0,0,0.28)" stroke-width="0.5"/>
  <line x1="13.5" y1="15.5" x2="24.5" y2="15.5" stroke="rgba(0,0,0,0.28)" stroke-width="0.5"/>
  <line x1="13.5" y1="17"   x2="24.5" y2="17"   stroke="rgba(0,0,0,0.28)" stroke-width="0.5"/>
  <line x1="13.5" y1="18.5" x2="24.5" y2="18.5" stroke="rgba(0,0,0,0.28)" stroke-width="0.5"/>
  <line x1="13.5" y1="20"   x2="24.5" y2="20"   stroke="rgba(0,0,0,0.28)" stroke-width="0.5"/>

  <!-- Staff lines on right sheet -->
  <line x1="29.5" y1="14"   x2="40.5" y2="14"   stroke="rgba(0,0,0,0.28)" stroke-width="0.5"/>
  <line x1="29.5" y1="15.5" x2="40.5" y2="15.5" stroke="rgba(0,0,0,0.28)" stroke-width="0.5"/>
  <line x1="29.5" y1="17"   x2="40.5" y2="17"   stroke="rgba(0,0,0,0.28)" stroke-width="0.5"/>
  <line x1="29.5" y1="18.5" x2="40.5" y2="18.5" stroke="rgba(0,0,0,0.28)" stroke-width="0.5"/>
  <line x1="29.5" y1="20"   x2="40.5" y2="20"   stroke="rgba(0,0,0,0.28)" stroke-width="0.5"/>

  <!-- Some music notes on sheet -->
  <circle cx="16"  cy="13.5" r="1.2" fill="rgba(0,0,0,0.65)"/>
  <line   x1="17.2" y1="10.5" x2="17.2" y2="13.5" stroke="rgba(0,0,0,0.65)" stroke-width="0.7"/>
  <circle cx="20"  cy="15"   r="1.2" fill="rgba(0,0,0,0.65)"/>
  <line   x1="21.2" y1="12"   x2="21.2" y2="15"   stroke="rgba(0,0,0,0.65)" stroke-width="0.7"/>
  <circle cx="32"  cy="14.5" r="1.2" fill="rgba(0,0,0,0.65)"/>
  <line   x1="33.2" y1="11.5" x2="33.2" y2="14.5" stroke="rgba(0,0,0,0.65)" stroke-width="0.7"/>

  <!-- Fallboard (keyboard cover) -->
  <rect x="3" y="29" width="54" height="5" rx="0" fill="#0A0A0A"/>
  <rect x="3" y="29" width="54" height="1.5" fill="rgba(255,255,255,0.04)"/>

  <!-- Key bed frame (dark border around keys) -->
  <rect x="3" y="34" width="54" height="44" rx="0" fill="#0C0C0C"/>

  <!-- White keys (7: C D E F G A B) -->
  <!-- width ≈ 7.3 per key, y=35 to y=75 (40 units tall) -->
  <rect x="4.5"  y="35" width="6.8" height="40" rx="1.5" fill="url(#pKeyWG)"/>
  <rect x="12"   y="35" width="6.8" height="40" rx="1.5" fill="url(#pKeyWG)"/>
  <rect x="19.5" y="35" width="6.8" height="40" rx="1.5" fill="url(#pKeyWG)"/>
  <rect x="27"   y="35" width="6.8" height="40" rx="1.5" fill="url(#pKeyWG)"/>
  <rect x="34.5" y="35" width="6.8" height="40" rx="1.5" fill="url(#pKeyWG)"/>
  <rect x="42"   y="35" width="6.8" height="40" rx="1.5" fill="url(#pKeyWG)"/>
  <rect x="49.5" y="35" width="6.2" height="40" rx="1.5" fill="url(#pKeyWG)"/>

  <!-- White key dividers (subtle shadow between keys) -->
  <line x1="11.5"  y1="35" x2="11.5"  y2="75" stroke="#BBBBBB" stroke-width="0.4" opacity="0.7"/>
  <line x1="19"    y1="35" x2="19"    y2="75" stroke="#BBBBBB" stroke-width="0.4" opacity="0.7"/>
  <line x1="26.5"  y1="35" x2="26.5"  y2="75" stroke="#BBBBBB" stroke-width="0.4" opacity="0.7"/>
  <line x1="34"    y1="35" x2="34"    y2="75" stroke="#BBBBBB" stroke-width="0.4" opacity="0.7"/>
  <line x1="41.5"  y1="35" x2="41.5"  y2="75" stroke="#BBBBBB" stroke-width="0.4" opacity="0.7"/>
  <line x1="49"    y1="35" x2="49"    y2="75" stroke="#BBBBBB" stroke-width="0.4" opacity="0.7"/>

  <!-- Key surface highlights (subtle top edge shimmer) -->
  <line x1="5"    y1="35.4" x2="11"   y2="35.4" stroke="rgba(255,255,255,0.7)" stroke-width="0.6"/>
  <line x1="12.5" y1="35.4" x2="18.5" y2="35.4" stroke="rgba(255,255,255,0.7)" stroke-width="0.6"/>
  <line x1="20"   y1="35.4" x2="26"   y2="35.4" stroke="rgba(255,255,255,0.7)" stroke-width="0.6"/>
  <line x1="27.5" y1="35.4" x2="33.5" y2="35.4" stroke="rgba(255,255,255,0.7)" stroke-width="0.6"/>
  <line x1="35"   y1="35.4" x2="41"   y2="35.4" stroke="rgba(255,255,255,0.7)" stroke-width="0.6"/>
  <line x1="42.5" y1="35.4" x2="48.5" y2="35.4" stroke="rgba(255,255,255,0.7)" stroke-width="0.6"/>
  <line x1="50"   y1="35.4" x2="55"   y2="35.4" stroke="rgba(255,255,255,0.7)" stroke-width="0.6"/>

  <!-- Black keys (C# D# F# G# A#) -->
  <!-- width=4.5, height=26, centered between white keys -->
  <!-- C#: x = 4.5 + 6.8 - 2.25 = 9.05 → 9 -->
  <rect x="9"    y="35" width="4.5" height="26" rx="1.5" fill="url(#pKeyBG)"/>
  <!-- D#: x = 12 + 6.8 - 2.25 = 16.55 → 16.6 -->
  <rect x="16.6" y="35" width="4.5" height="26" rx="1.5" fill="url(#pKeyBG)"/>
  <!-- (E# doesn't exist) -->
  <!-- F#: x = 27 + 6.8 - 2.25 = 31.55 → 31.5 -->
  <rect x="31.5" y="35" width="4.5" height="26" rx="1.5" fill="url(#pKeyBG)"/>
  <!-- G#: x = 34.5 + 6.8 - 2.25 = 39.05 → 39 -->
  <rect x="39"   y="35" width="4.5" height="26" rx="1.5" fill="url(#pKeyBG)"/>
  <!-- A#: x = 42 + 6.8 - 2.25 = 46.55 → 46.5 -->
  <rect x="46.5" y="35" width="4.5" height="26" rx="1.5" fill="url(#pKeyBG)"/>

  <!-- Black key specular highlights -->
  <rect x="9.3"    y="35.3" width="1.5" height="22" rx="0.75" fill="rgba(255,255,255,0.08)"/>
  <rect x="16.9"   y="35.3" width="1.5" height="22" rx="0.75" fill="rgba(255,255,255,0.08)"/>
  <rect x="31.8"   y="35.3" width="1.5" height="22" rx="0.75" fill="rgba(255,255,255,0.08)"/>
  <rect x="39.3"   y="35.3" width="1.5" height="22" rx="0.75" fill="rgba(255,255,255,0.08)"/>
  <rect x="46.8"   y="35.3" width="1.5" height="22" rx="0.75" fill="rgba(255,255,255,0.08)"/>

  <!-- Pedal rail -->
  <rect x="16" y="77" width="28" height="3" rx="1.5" fill="#1A1A1A"/>
  <!-- 3 pedals (soft, sostenuto, damper) -->
  <ellipse cx="22" cy="79.5" rx="3.5" ry="1.5" fill="#2A2A2A"/>
  <ellipse cx="22" cy="79"   rx="2.5" ry="1"   fill="#383838"/>
  <ellipse cx="30" cy="79.5" rx="3.5" ry="1.5" fill="#2A2A2A"/>
  <ellipse cx="30" cy="79"   rx="2.5" ry="1"   fill="#383838"/>
  <ellipse cx="38" cy="79.5" rx="3.5" ry="1.5" fill="#2A2A2A"/>
  <ellipse cx="38" cy="79"   rx="2.5" ry="1"   fill="#383838"/>
</svg>
